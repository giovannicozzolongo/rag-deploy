services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # pull mistral on first start, then keep serving
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull mistral && tail -f /dev/null"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    command: streamlit run src/ui/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  ollama_data:
